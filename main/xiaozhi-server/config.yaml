# During development, please create a 'data' directory in the project root, then create an empty file named [.config.yaml] in that directory.
# Any configuration you want to override should be modified in the [.config.yaml] file instead of the [config.yaml] file.
# The system prioritizes [data/.config.yaml]. If a configuration does not exist there, it will automatically fall back to [config.yaml].
# This approach simplifies configuration and protects your secret keys.
# If you use the control panel, the following configurations will not take effect; please modify configurations in the control panel instead.

# #####################################################################################
# ############################# Basic Server Configuration ############################
server:
  # Server listening address and port
  ip: 0.0.0.0
  port: 8000
  # HTTP service port, used for simple OTA interface and vision analysis interface
  http_port: 8003
  # This websocket configuration refers to the websocket address sent by the OTA interface to the device
  # By default, the OTA interface automatically generates it. 
  # This may not be accurate when using Docker or public deployments (using SSL/domain).
  # If using Docker, set websocket to the local area network address.
  # If using public deployment, set websocket to the public address.
  websocket: ws://10.17.0.111:8000/xiaozhi/v1/
  # Vision analysis interface address sent to the device
  # By default, the system automatically generates it.
  vision_explain: http://your_ip_or_domain:port/mcp/vision/explain
  # Timezone offset for OTA response information
  timezone_offset: +8
  # Authentication configuration
  auth:
    # Whether to enable authentication
    enabled: false
    # Whitelist of device ID lists. Devices in the whitelist will skip token validation.
    allowed_devices:
      - "11:22:33:44:55:66"
 # MQTT gateway configuration, used for OTA delivery, formatted as host:port based on mqtt_gateway .env
  mqtt_gateway: null
  # MQTT signature key for generating MQTT passwords
  mqtt_signature_key: null
  # UDP gateway configuration
  udp_gateway: null
log:
  # Console log format: time, log level, tag, message
  log_format: "<green>{time:YYMMDD HH:mm:ss}</green>[{version}_{selected_module}][<light-blue>{extra[tag]}</light-blue>]-<level>{level}</level>-<light-green>{message}</light-green>"
  # File log format: time, version, module, name, level, tag, message
  log_format_file: "{time:YYYY-MM-DD HH:mm:ss} - {version}_{selected_module} - {name} - {level} - {extra[tag]} - {message}"
  # Log level: INFO, DEBUG
  log_level: INFO
  # Log path
  log_dir: tmp
  # Log file
  log_file: "server.log"
  # Data directory path
  data_dir: data

# Delete audio files after use
delete_audio: true
# Timeout for disconnecting if no voice input is received (seconds). Default is 2 minutes (120 seconds).
close_connection_no_voice_time: 40
# TTS request timeout (seconds)
tts_timeout: 10
# Enable wake word response cache acceleration
enable_wakeup_words_response_cache: true
# Whether to reply with a greeting after wake word
enable_greeting: true
# Whether to play a notification sound after speaking
enable_stop_tts_notify: false
# Notification sound asset URL
stop_tts_notify_voice: "config/assets/tts_notify.mp3"
# Whether to enable WebSocket heartbeat (Keep-alive) mechanism
enable_websocket_ping: false


# TTS audio send delay configuration
# tts_audio_send_delay: controls the interval between audio packets
#   0: Use precise time control, strictly matching the audio frame rate (default)
#   > 0: Use fixed delay (ms), for example: 60
tts_audio_send_delay: 0

exit_commands:
  - "退出"
  - "关闭"
  - "exit"
  - "stop"

xiaozhi:
  type: hello
  version: 1
  transport: websocket
  audio_params:
    format: opus
    # Opus supported sample rates: [8000, 12000, 16000, 24000, 48000]
    sample_rate: 24000
    channels: 1
    frame_duration: 60

# Module Test Configuration
module_test:
  test_sentences:
    - "Ni hao, please introduce yourself"
    - "What's the weather like today?"
    - "Please summarize the principles and applications of quantum computing in 100 words"

# Wake words used to distinguish wake words from speech content
wakeup_words:
  - "你好小智"
  - "嘿你好呀"
  - "你好小志"
  - "小爱同学"
  - "你好小鑫"
  - "你好小新"
  - "小美同学"
  - "小龙小龙"
  - "喵喵同学"
  - "小滨小滨"
  - "小冰小冰"
# MCP endpoint address. Format: ws://your_mcp_ip_or_domain:port/mcp/?token=your_token
mcp_endpoint: "your_mcp_websocket_address"

# Context Provider Configuration for dynamic data injection (e.g., health data, stocks)
context_providers:
  - url: ""
    headers:
      Authorization: ""

# Plugin Configurations
plugins:
  # Weather plugin configuration. Fill in your api_key here.
  # Key from: https://console.qweather.com/#/apps/create-key/over
  get_weather:
    api_host: "mj7p3y7naa.re.qweatherapi.com"
    api_key: "a861d0d5e7bf4ee1a83d9a9e4f96d4da"
    default_location: "Guangzhou"
  # News plugin configuration from ChinaNews RSS. 
  get_news_from_chinanews:
    default_rss_url: "https://www.chinanews.com.cn/rss/society.xml"
    society_rss_url: "https://www.chinanews.com.cn/rss/society.xml"
    world_rss_url: "https://www.chinanews.com.cn/rss/world.xml"
    finance_rss_url: "https://www.chinanews.com.cn/rss/finance.xml"
