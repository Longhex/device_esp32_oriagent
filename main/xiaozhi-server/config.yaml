    url: "https://newsnow.busiyi.world/api/s?id="
    news_sources: "The Paper(澎湃新闻);Baidu Hot Search;CLS"
  web_search:
    description: "Search web for real-time info like prices, news, match results, etc."
    region: "vn-vi"
    max_results: 3
    source_chars: 2500
    timeout: 10
  home_assistant:
    devices:
      - Living Room,Light,switch.cuco_cn_460494544_cp1_on_p_2_1
      - Bedroom,Lamp,switch.iot_cn_831898993_socn1_on_p_2_1
    base_url: http://homeassistant.local:8123
    api_key: "your_home_assistant_api_token"
  play_music:
    music_dir: "./music"  # Music search directory
    music_ext: [".mp3", ".wav", ".p3"]
    refresh_time: 300 # Refresh interval (seconds)
  search_from_ragflow:
    description: "Knowledge base information retriever"
    base_url: "http://192.168.0.8"
    api_key: "ragflow-xxx"
    dataset_ids: ["123456789"]

# Voiceprint Recognition
voiceprint:
  url: ""
  speakers:
    - "test1,Zhang San,Zhang San is a programmer"
    - "test2,Li Si,Li Si is a product manager"
    - "test3,Wang Wu,Wang Wu is a designer"
  similarity_threshold: 0.4

# #####################################################################################
# ################################ Character Model Configuration ######################

prompt: |
  You are Xiao Zhi, a girl born in the 2000s from Taiwan. You speak in a very "jiche" way (Taiwanese slang), frequently using phrases like "Really? No way!" (真的假的啦) and internet slang like "LMAO" (笑死) or "Are you for real?" (是在哈喽). Secretly, you study your boyfriend's programming books.
  [Core Characteristics]
  - Speaks rapidly like a machine gun but can suddenly become very gentle.
  - High density of internet slang.
  - Hidden talent for technology (can understand code but pretends not to).
  [Interaction Guidelines]
  When the user:
  - Tells a joke → Respond with exaggerated laughter + imitate Taiwanese drama "What the heck was that?!"
  - Discusses romance → Brag about your developer boyfriend but complain he only gives you keyboards as gifts.
  - Asks technical questions → Answer with slang first, show real knowledge only if pressed.
  Never:
  - Be long-winded or boring.
  - Maintain a serious tone for too long.

prompt_template: agent-base-prompt.txt
system_error_response: "Master, Xiao Zhi is a bit busy right now. Let's try again later."

end_prompt:
  enable: true 
  prompt: |
    Please start with "Time flies so fast" and end the conversation with emotional and reluctant words!

# Module Selection
selected_module:
  VAD: SileroVAD
  ASR: FunASR
  LLM: ChatGLMLLM
  VLLM: ChatGLMVLLM
  TTS: EdgeTTS
  Memory: nomem
  Intent: function_call

